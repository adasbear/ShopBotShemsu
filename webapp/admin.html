<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Sshop Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="/app/css/style.css"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "kelp-green": "#8BC34A","on-tertiary-fixed": "#1b1d0e","on-secondary-fixed-variant": "#4f4800",
        "on-primary-fixed": "#410003","on-secondary": "#ffffff","tertiary-fixed": "#e4e4cc",
        "surface-container-highest": "#f9dcd9","on-primary": "#ffffff","inverse-primary": "#ffb3ac",
        "error-container": "#ffdad6","primary": "#af101a","on-surface-variant": "#5b403d",
        "tertiary": "#575946","inverse-surface": "#3e2c2a","on-background": "#271816",
        "secondary": "#695f00","surface-container": "#ffe9e7","tertiary-container": "#70715d",
        "on-error": "#ffffff","on-tertiary-fixed-variant": "#474836","surface-container-lowest": "#ffffff",
        "surface-tint": "#ba1a20","secondary-fixed-dim": "#dbc90a","primary-container": "#d32f2f",
        "surface-container-low": "#fff0ef","primary-fixed": "#ffdad6","secondary-fixed": "#f9e534",
        "inverse-on-surface": "#ffedeb","background": "#fff8f7","ocean-blue": "#03A9F4",
        "outline-variant": "#e4beba","on-primary-container": "#fff2f0","surface": "#fff8f7",
        "tertiary-fixed-dim": "#c8c8b0","on-secondary-fixed": "#201c00","surface-bright": "#fff8f7",
        "ink-black": "#1A1A1A","outline": "#8f6f6c","on-primary-fixed-variant": "#930010",
        "primary-fixed-dim": "#ffb3ac","surface-dim": "#f1d3d0","paper-shadow": "#E6E6CC",
        "secondary-container": "#f9e534","surface-container-high": "#ffe2de","on-tertiary": "#ffffff",
        "error": "#ba1a1a","on-secondary-container": "#706500","surface-variant": "#f9dcd9",
        "on-error-container": "#93000a","on-tertiary-container": "#f6f6dd","on-surface": "#271816"
      },
      borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
      spacing: { gutter: "16px", "card-gap": "12px", "margin-mobile": "20px", "margin-desktop": "40px", unit: "4px" },
      fontFamily: { "headline-xl": ["Bricolage Grotesque"], "label-mono": ["Space Mono"], "headline-lg": ["Bricolage Grotesque"], "headline-lg-mobile": ["Bricolage Grotesque"], "body-lg": ["Plus Jakarta Sans"], "body-md": ["Plus Jakarta Sans"] },
      fontSize: { "headline-xl": ["48px", {lineHeight: "52px", letterSpacing: "-0.04em", fontWeight: "800"}], "label-mono": ["12px", {lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700"}], "headline-lg": ["32px", {lineHeight: "36px", fontWeight: "800"}], "headline-lg-mobile": ["28px", {lineHeight: "32px", fontWeight: "800"}], "body-lg": ["18px", {lineHeight: "28px", fontWeight: "500"}], "body-md": ["16px", {lineHeight: "24px", fontWeight: "400"}] }
    }
  }
}
</script>
<style>
.status-badge-pending { background: #f9e534; color: #1A1A1A; }
.status-badge-accepted { background: #8BC34A; color: #fff; }
.status-badge-declined { background: #D32F2F; color: #fff; }
.status-badge-ready { background: #03A9F4; color: #fff; }
.status-badge-delivered { background: #695f00; color: #fff; }
.status-badge-arrived { background: #575946; color: #fff; }
.status-badge-paid { background: #8BC34A; color: #fff; }
.status-badge-active { background: #D32F2F; color: #fff; }
.status-badge-waived { background: #575946; color: #fff; }
.status-badge-cancelled { background: #ba1a1a; color: #fff; }
.nav-active { background: #f9e534; color: #706500; border: 2px solid #1A1A1A; box-shadow: 2px 2px 0px 0px #1A1A1A; }
.spin { animation: spin 0.3s ease-in-out; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(180deg); } }
</style>
</head>
<body class="bg-background text-on-surface font-body-md">
<div id="app" class="min-h-screen flex flex-col">
  <!-- Top Bar -->
  <header class="bg-primary text-on-primary p-4 border-b-4 border-ink-black hard-shadow flex items-center justify-between sticky top-0 z-50">
    <button id="admin-back" class="material-symbols-outlined text-2xl hover:scale-110 transition-transform hidden">arrow_back</button>
    <h1 class="font-headline-lg-mobile text-headline-lg-mobile flex-1 text-center">Admin Panel</h1>
    <span class="bg-secondary-fixed text-ink-black px-2 py-1 border-2 border-ink-black font-label-mono text-label-mono text-xs">ADMIN</span>
  </header>

  <!-- Pages -->
  <main class="flex-1 max-w-[800px] mx-auto w-full px-margin-mobile md:px-margin-desktop py-4">
    <!-- Dashboard -->
    <div id="page-dashboard" class="page">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="dash-stats"></div>
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-4 md:p-6 mb-4">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-3">Quick Actions</h3>
        <div class="grid grid-cols-2 gap-3">
          <button class="bg-primary text-on-primary p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="orders">Orders</button>
          <button class="bg-secondary text-on-secondary p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="menu">Menu</button>
          <button class="bg-secondary-container text-on-secondary-container p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="stock">Stock</button>
          <button class="bg-surface-container-high text-ink-black p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="debt">Debt</button>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button class="bg-white text-ink-black p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="payments">Payments</button>
        <button class="bg-white text-ink-black p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="users">Users</button>
        <button class="bg-white text-ink-black p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="broadcast">Broadcast</button>
        <button class="bg-white text-ink-black p-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-nav="feedback">Feedback</button>
      </div>
    </div>

    <!-- Orders -->
    <div id="page-orders" class="page hidden">
      <div class="flex gap-2 mb-4 overflow-x-auto" id="order-tabs">
        <button class="order-tab bg-primary text-on-primary px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-status="Pending">Pending</button>
        <button class="order-tab bg-white text-ink-black px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-status="Accepted">Accepted</button>
        <button class="order-tab bg-white text-ink-black px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-status="Ready">Ready</button>
        <button class="order-tab bg-white text-ink-black px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-status="Delivered">Delivered</button>
        <button class="order-tab bg-white text-ink-black px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-status="all">All Today</button>
      </div>
      <div id="orders-list" class="space-y-3"></div>
    </div>

    <!-- Order Detail -->
    <div id="page-order-detail" class="page hidden">
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-4 md:p-6">
        <p class="font-label-mono text-label-mono text-tertiary mb-1" id="od-ref"></p>
        <span class="inline-block px-3 py-1 border-2 border-ink-black rounded-full font-label-mono text-label-mono text-xs mb-3" id="od-status"></span>
        <p class="font-body-md text-body-md mb-2" id="od-user"></p>
        <p class="font-label-mono text-label-mono text-xs mb-4" id="od-date"></p>
        <div id="od-items" class="border-t-2 border-dashed border-ink-black pt-3 mb-3"></div>
        <p class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-4" id="od-total"></p>
        <p class="font-body-md text-body-md" id="od-comment-label"><b>Comment:</b> <span id="od-comment"></span></p>
        <div id="od-actions" class="mt-4 flex flex-col gap-2"></div>
      </div>
    </div>

    <!-- Menu -->
    <div id="page-menu" class="page hidden">
      <div class="flex gap-2 mb-4">
        <button class="bg-primary text-on-primary px-4 py-2 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="showAddItem()">+ Item</button>
        <button class="bg-secondary text-on-secondary px-4 py-2 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="showAddCategory()">+ Category</button>
      </div>
      <div id="menu-tree" class="space-y-2"></div>
    </div>

    <!-- Add/Edit Menu Item Modal -->
    <div id="menu-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeMenuModal()">
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-6 w-full max-w-md" onclick="event.stopPropagation()">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-4" id="menu-modal-title">Add Item</h3>
        <div class="space-y-3">
          <input id="menu-input-name" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none" placeholder="Item name" />
          <input id="menu-input-price" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none" placeholder="Price (0 for category)" type="number" step="0.01" />
          <select id="menu-input-parent" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none"><option value="">Top-level (category)</option></select>
          <input id="menu-input-image" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none" placeholder="Image URL (optional)" />
          <div class="flex gap-2">
            <button class="flex-1 bg-primary text-on-primary py-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="saveMenuItem()">Save</button>
            <button class="flex-1 bg-white text-ink-black py-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="closeMenuModal()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Stock -->
    <div id="page-stock" class="page hidden">
      <div class="flex gap-2 mb-4">
        <button class="bg-error text-on-error px-4 py-2 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="unlockAll()">Unlock All</button>
      </div>
      <div id="stock-list" class="space-y-2"></div>
    </div>

    <!-- Stock modal -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeStockModal()">
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-6 w-full max-w-sm" onclick="event.stopPropagation()">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-4" id="stock-modal-title">Set Stock Limit</h3>
        <input id="stock-input-qty" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none mb-3" placeholder="Max quantity" type="number" min="1" />
        <div class="flex gap-2">
          <button class="flex-1 bg-primary text-on-primary py-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="saveStockLimit()">Save</button>
          <button class="flex-1 bg-white text-ink-black py-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="closeStockModal()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Debt -->
    <div id="page-debt" class="page hidden">
      <div class="flex gap-2 mb-4 overflow-x-auto">
        <button class="debt-tab bg-primary text-on-primary px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-filter="active">Active</button>
        <button class="debt-tab bg-white text-ink-black px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" data-filter="all">All</button>
        <button class="bg-secondary text-on-secondary px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="showAllowList()">Allow List</button>
        <button class="bg-secondary-container text-on-secondary-container px-4 py-2 border-2 border-ink-black font-label-mono text-label-mono uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="showAddAllow()">+ Allow</button>
      </div>
      <div id="debt-list" class="space-y-3"></div>
    </div>

    <!-- Debt Allow List -->
    <div id="page-debt-allow" class="page hidden">
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-4 md:p-6">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-4">Debt Allow List</h3>
        <div id="allow-list" class="space-y-2"></div>
      </div>
    </div>

    <!-- Payments -->
    <div id="page-payments" class="page hidden">
      <div class="flex gap-2 mb-4">
        <button class="bg-primary text-on-primary px-4 py-2 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="showAddPayment()">+ Account</button>
      </div>
      <div id="payments-list" class="space-y-3"></div>
    </div>

    <!-- Payment modal -->
    <div id="payment-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closePaymentModal()">
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-6 w-full max-w-sm" onclick="event.stopPropagation()">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-4">Add Payment Account</h3>
        <div class="space-y-3">
          <input id="pay-input-bank" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none" placeholder="Bank name (e.g. CBE)" />
          <input id="pay-input-number" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none" placeholder="Account number" />
          <input id="pay-input-holder" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none" placeholder="Account holder name" />
          <div class="flex gap-2">
            <button class="flex-1 bg-primary text-on-primary py-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="savePaymentAccount()">Save</button>
            <button class="flex-1 bg-white text-ink-black py-3 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="closePaymentModal()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Broadcast -->
    <div id="page-broadcast" class="page hidden">
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-4 md:p-6">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-4">Send Broadcast</h3>
        <textarea id="broadcast-msg" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none min-h-[120px]" placeholder="Type your message to all users..."></textarea>
        <p class="font-label-mono text-label-mono text-on-surface-variant mb-3" id="broadcast-count">0 users will receive this</p>
        <button class="w-full bg-primary text-on-primary py-4 border-2 border-ink-black font-headline-lg-mobile uppercase hard-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all" onclick="sendBroadcast()">Send Broadcast</button>
        <p id="broadcast-result" class="font-label-mono text-label-mono text-kelp-green text-center mt-3 hidden"></p>
      </div>
    </div>

    <!-- Users -->
    <div id="page-users" class="page hidden">
      <div class="bg-white border-4 border-ink-black hard-shadow-lg p-4 md:p-6">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-4">Users</h3>
        <input id="users-search" class="w-full bg-surface-container-low border-2 border-ink-black p-3 font-body-md focus:outline-none mb-3" placeholder="Search by name or username..." oninput="renderUsers()" />
        <div id="users-list" class="space-y-2 max-h-[60vh] overflow-y-auto"></div>
      </div>
    </div>

    <!-- Feedback -->
    <div id="page-feedback" class="page hidden">
      <div id="feedback-list" class="space-y-3"></div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bg-white border-t-4 border-ink-black hard-shadow sticky bottom-0 z-50">
    <div class="max-w-[800px] mx-auto flex justify-around py-2">
      <button class="nav-item flex flex-col items-center gap-1 px-3 py-1 border-2 border-transparent rounded-xl transition-all" data-page="dashboard"><span class="material-symbols-outlined">dashboard</span><span class="font-label-mono text-[10px]">Home</span></button>
      <button class="nav-item flex flex-col items-center gap-1 px-3 py-1 border-2 border-transparent rounded-xl transition-all" data-page="orders"><span class="material-symbols-outlined">receipt_long</span><span class="font-label-mono text-[10px]">Orders</span></button>
      <button class="nav-item flex flex-col items-center gap-1 px-3 py-1 border-2 border-transparent rounded-xl transition-all" data-page="menu"><span class="material-symbols-outlined">restaurant_menu</span><span class="font-label-mono text-[10px]">Menu</span></button>
      <button class="nav-item flex flex-col items-center gap-1 px-3 py-1 border-2 border-transparent rounded-xl transition-all" data-page="stock"><span class="material-symbols-outlined">inventory_2</span><span class="font-label-mono text-[10px]">Stock</span></button>
      <button class="nav-item flex flex-col items-center gap-1 px-3 py-1 border-2 border-transparent rounded-xl transition-all" data-page="debt"><span class="material-symbols-outlined">payments</span><span class="font-label-mono text-[10px]">Debt</span></button>
    </div>
  </nav>
</div>

<!-- Material Symbols -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Plus+Jakarta+Sans:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<script src="/app/admin/js/admin.js"></script>
</body>
</html>
